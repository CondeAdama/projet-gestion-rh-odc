server.port=${PORT:8080}
server.servlet.context-path=/api/v2

spring.datasource.url=jdbc:mariadb://${AIVEN_DB_HOST:minerva-mysql-minerva-group.h.aivencloud.com}:${AIVEN_DB_PORT:23766}/${AIVEN_DB_NAME:gestion_rh_db}?sslMode=VERIFY_CA&serverSslCert=${AIVEN_SSL_CA:/app/certs/aiven-minerva-ca.pem}
spring.datasource.username=${AIVEN_DB_USER:avnadmin}
spring.datasource.password=${AIVEN_DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

minerva.app.url=${MINERVA_APP_URL:https://minerva-rh.onrender.com}
minerva.cors.allowed-origins=${MINERVA_CORS_ORIGINS:${minerva.app.url},http://localhost:5173}

brevo.smtp.host=smtp-relay.brevo.com
brevo.smtp.port=587
brevo.smtp.login=${BREVO_SMTP_LOGIN:}
brevo.smtp.password=${BREVO_SMTP_PASSWORD:}
brevo.smtp.from-email=${BREVO_SMTP_FROM:}
brevo.smtp.from-name=MINERVA GROUP
# Render bloque les ports SMTP — envoi via API HTTP Brevo (port 443)
brevo.use-api=true
brevo.api-key=${BREVO_API_KEY:}

odc.jwt.secret=${JWT_SECRET}
odc.jwt.expiration=86400000

odc.admin.email=${ADMIN_EMAIL:admin@minerva.group}
odc.admin.password=${ADMIN_PASSWORD:Admin@2026!}

notification.mode=${NOTIFICATION_MODE:mock}
notification.sms.from=MINERVA-RH

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
